# Indicative (non-blocking) live browser smoke tests for @seasketch/mapbox-gl-wms-source.
# Hits real WMS example services; failures do not fail the overall workflow.
name: WMS Live E2E (indicative)

on:
  push:
    paths:
      - "packages/mapbox-gl-wms-source/**"
      - ".github/workflows/wms-live-e2e.yml"
  workflow_dispatch:

jobs:
  wms-live-playwright:
    name: Live WMS Playwright smoke
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "23"
          cache: "npm"

      - name: Install dependencies
        run: npx lerna@6.6.2 bootstrap --ci

      - name: Build metadata-parser (harness alias)
        working-directory: ./packages/metadata-parser
        run: npm run build

      - name: Install Playwright Chromium
        working-directory: ./packages/mapbox-gl-wms-source
        run: npx playwright install chromium

      - name: Run live Playwright tests
        working-directory: ./packages/mapbox-gl-wms-source
        env:
          CI: "true"
          VITE_MAPBOX_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}
        run: npm run test:e2e:live

      - name: Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: wms-live-playwright-report
          path: packages/mapbox-gl-wms-source/test-results/
          retention-days: 7
