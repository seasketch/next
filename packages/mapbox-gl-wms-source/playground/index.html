<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WMS Playground — @seasketch/mapbox-gl-wms-source</title>
    <link
      href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="app">
      <aside id="sidebar">
        <h1>WMS Playground</h1>
        <div id="status-banner" class="status-banner"></div>
        <label>
          Service
          <select id="service-select"></select>
        </label>
        <label>
          Custom URL
          <input id="custom-url" type="url" placeholder="https://..." />
        </label>
        <button id="load-btn">Load capabilities</button>
        <label>
          Render mode
          <select id="mode-select">
            <option value="dynamic" selected>Dynamic (viewport image)</option>
            <option value="tiled">Tiled (raster template)</option>
          </select>
        </label>
        <label>
          <input id="hidpi" type="checkbox" checked /> HiDPI
        </label>
        <label>
          Opacity
          <input id="opacity" type="range" min="0" max="1" step="0.05" value="1" />
        </label>
        <h2>Layers</h2>
        <div id="layer-tree"></div>
        <h2>Legend</h2>
        <div id="legend-panel"></div>
        <h2>Request log</h2>
        <pre id="request-log"></pre>
      </aside>
      <main>
        <div id="map"></div>
        <div id="feature-info"></div>
      </main>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
