name = "pmtiles-server"
main = "src/index.ts"
compatibility_date = "2026-07-14"
# Request-scoped timing context for Server-Timing (see src/timing.ts).
compatibility_flags = ["nodejs_als"]

# Workers Caching: serves cache hits without invoking the worker, collapses
# concurrent misses, and participates in tiered caching.
[cache]
enabled = true

# Default router always runs for /v2 auth; TilesBackend is the cached entrypoint.
[exports.default]
type = "worker"
[exports.default.cache]
enabled = false

[exports.TilesBackend]
type = "worker"
[exports.TilesBackend.cache]
enabled = true

[[r2_buckets]]
binding = 'TILES_BUCKET'
bucket_name = 'ssn-tiles'
preview_bucket_name = 'ssn-tiles'

# Run `echo <VALUE> | wrangler secret put <NAME>` for each of these

[secrets]
required = ["JWKS_URL", "MAPBOX_ACCESS_TOKEN", "PUBLIC_HOSTNAME"]
