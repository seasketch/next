version: "3"
services:
  db:
    container_name: "seasketch_db"
    image: underbluewaters/postgres-13-postgis-3.1
    ports:
      - "54321:5432"
    environment:
      POSTGRES_PASSWORD: password
    volumes:
      - ./init_dockerdb.sql:/docker-entrypoint-initdb.d/init_dockerdb.sql
    # Avoid log_statement=all: graphile_worker polls constantly and will fill
    # Docker's disk with container JSON logs (previously grew to ~232GB).
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
  redis:
    image: "redis:alpine"
    command: >
      --requirepass ucsb
    ports:
      - "6379:6379"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
